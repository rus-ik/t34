# MQTT bridge: подписка на топики контроллера 192.168.0.189
# Деплоить на главный контроллер 192.168.0.200:
#   /etc/mosquitto/conf.d/bridge-189.conf
# После деплоя: systemctl restart mosquitto

connection bridge-189
address 192.168.0.189:1883
topic /devices/mtdx62-mb_28/# in 0
topic /devices/wb-mcm8_119/# in 0
