# MQTT bridge: топики между контроллером 192.168.0.189 и главным 192.168.0.200
# Деплоить на главный контроллер 192.168.0.200:
#   /etc/mosquitto/conf.d/bridge-189.conf
# После деплоя: systemctl restart mosquitto

connection bridge-189
address 192.168.0.189:1883

# ── Сенсоры .189 → .200 (нужны скриптам на .200) ─────────────────────────
topic /devices/mtdx62-mb_28/# in 0
topic /devices/mtdx62-mb_24/# in 0
topic /devices/wb-mcm8_119/# in 0

# ── Реле .200, управляемые скриптом auto-lights-ctrl2.js на .189 ──────────
# «both»: команды /on идут .189→.200, статус реле возвращается .200→.189
# Трафик минимален: переключение происходит только при входе/выходе из комнаты.
topic /devices/wb-mr6cu_26/# both 0
topic /devices/wb-mr6cu_43/# both 0
topic /devices/wb-mr6cu_21/# both 0
topic /devices/wb-mr6cu_44/# both 0

# ── Мастер-выключатель: счётчик с .200 → .189 ────────────────────────────
topic /devices/t34-master/controls/last_off out 0
