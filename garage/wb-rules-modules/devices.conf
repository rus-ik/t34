{
  // ================================================================
  // devices.conf  –  ONLY file to edit for hardware or timing changes
  // Loaded by garage.js via readConfig()
  // Supports // line comments and /* block comments */
  // ================================================================

  // ── Global automation config ──────────────────────────────────────
  //
  // All values here are defaults. Any key can be overridden per zone
  // (in "zones") or per car slot (in "carSlots") by adding the same
  // key directly inside that zone/slot object.
  "config": {
    "luxThresholdOn":       45,    // lux – turn lights ON  below this
    "luxThresholdOff":      55,    // lux – turn lights OFF above this (hysteresis)
    "autoOffMin":            5,    // hard auto-off after N min idle (0 = disabled)
    "maxOnHours":            4,    // absolute safety cap, hours
    "pirWindowSec":        120,    // seconds a PIR event stays "fresh"
    "presenceOffDelaySec": 120,    // grace period after all sensors clear

    // ── Car detection defaults ─────────────────────────────────────
    //
    // CO2 spike is SHARED – one engine fills the whole garage.
    // Distance and confirm/cooldown are PER SLOT (overridable below).
    //
    // Normal indoor air:         400-600 ppm
    // Car engine exhaust spike:  800-1200+ ppm within seconds of entry
    "co2SpikeThreshold":   800,   // ppm – above this = engine exhaust suspected
    "co2BaselinePpm":      600,   // ppm – below this resets the global CO2 latch
    "co2ConfirmWindowSec":  30,   // sec – default max gap between CO2 and distance
    "carDistanceMax":        2.0, // m   – ceiling MTD below this = car present
    "gateOpenPulseSec":      1,   // sec – momentary relay pulse to gate motor
    "gateReopenCooldownMin": 5,   // min – default per-slot lockout after auto-open

    // ── Astronomical clock (external gate lights) ──────────────────
    "latitude":             48.4827,  // Khabarovsk
    "longitude":           135.0840,
    "gateExternalLightMin":  5        // min – how long external gate lights stay on after gate movement
  },

  // ── WB-MCM8 dry-contact input modules (door reed switches) ────────
  "mcm": {
    "module1": {
      "id": "wb-mcm8_59",
      "inputs": {
        "garageDoorLeft":  3,
        "garageDoorRight": 2
      }
    },
    "module2": {
      "id": "wb-mcm8_94",
      "inputs": {
        "carGateLeft":  1,
        "carGateRight": 2
      }
    }
  },

  // ── MDT262-MD mmWave sensors (PRESENCE only) ──────────────────────
  //
  // Used in "zones" → mtdSensors for presence detection only.
  // Distance measurement is handled by the WT53R-485 LiDAR below.
  "mtd": {
    "ceilingSlot1": { "id": "mdt262-md_1" },  // above slot 1 (left),  presence only
    "ceilingSlot2": { "id": "mdt262-md_2" }   // above slot 2 (right), presence only
  },

  // ── WT53R-485 LiDAR sensors (DISTANCE only) ───────────────────────
  //
  // One sensor per slot, ceiling-mounted above the parking place.
  // Used in "carSlots" → lidarSensor for car presence detection.
  // Publishes distance on the "Distance" channel (metres).
  "lidar": {
    "lidarSlot1": { "id": "wt53r_1" },  // above slot 1 (left)
    "lidarSlot2": { "id": "wt53r_2" }   // above slot 2 (right)
  },

  // ── WB-MSW-v4 PIR / climate / CO2 wall sensors ────────────────────
  //
  // co2Sensor: true  → this sensor's "CO2" channel feeds the shared latch.
  // The highest reading across all co2Sensor:true devices is used.
  //
  // Placement (6.81 × 7.56 m, ceiling 3.20 m):
  //   garage_a – rear wall, centre (3.4 m from each side), h ≈ 2.1 m; faces gates
  //   garage_b – right side wall, mid-depth (≈ 3.7 m from rear), h ≈ 2.0 m; faces left across both slots
  "msw": {
    "garage_a": { "id": "wb-msw-v4_110", "label": "rear wall centre",       "co2Sensor": true },
    "garage_b": { "id": "wb-msw-v4_36",  "label": "right wall mid-depth",   "co2Sensor": true }
  },

  // ── WB-MR6C v3 relay modules ──────────────────────────────────────
  "mr6c": {
    "module1": {
      "id": "wb-mr6cv3_119",
      "channels": {
        "carGateLeft":  4,   // car gate area light – left
        "carGateRight": 5,   // car gate area light – right
        "gateMotor1":   3,   // momentary pulse → gate 1 motor controller
        "gateMotor2":   6    // momentary pulse → gate 2 motor controller
      }
    },
    "module2": {
      "id": "wb-mr6cu_43",
      "channels": {
        "garageRow1":   3   // garage ceiling light, row 1
      }
    },
    "module3": {
      "id": "wb-mr6cu_21",
      "channels": {
        "garageRow2":   6   // garage ceiling light, row 2
      }
    }
  },

  // ── Lighting zones ─────────────────────────────────────────────────
  //
  // mcmDoors: [ [moduleName, inputName, invertLogic], ... ]
  //   invertLogic: true  = normally-closed switch (1 = door shut)
  //               false  = normally-open  switch (1 = door open)  [default]
  //
  // Any config key can be added here to override the global default
  // for this zone only (e.g. "autoOffMin": 10).
//      "mtdSensors": [ "garage" ],
  "zones": {
    "mainGarage": {
      "mcmDoors":   [ ["module1", "garageDoorLeft",  false],
                      ["module1", "garageDoorRight", false] ],
      "mtdSensors": [ "ceilingSlot1", "ceilingSlot2" ],
      "mswSensors": [ "garage_a", "garage_b" ],
      "mr6cLights": [ ["module2", "garageRow1"],
                      ["module3", "garageRow2"] ]
    },
    "carGates": {
      "mcmDoors":   [ ["module2", "carGateLeft",  false],
                      ["module2", "carGateRight", false] ],
      "mr6cLights": [ ["module1", "carGateLeft"],
                      ["module1", "carGateRight"] ],
      "astroMode":           true,  // lights controlled by astronomical clock, not lux
      "gateExternalLightMin": 5,    // override global default for this zone
      "maxOnHours":  2
    }
  },

  // ── Car detection slots ────────────────────────────────────────────
  //
  // Each slot is fully independent:
  //   name              – display label in logs and virtual device
  //   lidarSensor       – key into lidar{} (WT53R-485) for distance measurement
  //   gateTriggerRelay  – [mr6cModule, channelName] pulsed on detection
  //   gateReedSensor    – [mcmModule, inputName] reed switch that detects physical
  //                       gate close (used for Telegram "closed" notification)
  //
  // Per-slot overrides (fall back to global config if omitted):
  //   co2ConfirmWindowSec   – max seconds between CO2 spike and distance confirm
  //   gateReopenCooldownMin – lockout after auto-open
  //
  // Tune each slot independently to compensate for physical differences
  // (e.g. one slot is closer to the exhaust vent → shorter confirm window).
  "carSlots": [
    {
      "name":                  "Slot 1 (Left gate)",
      "lidarSensor":           "lidarSlot1",
      "gateTriggerRelay":      ["module1", "gateMotor1"],
      "gateReedSensor":        ["module2", "carGateLeft"],
      "co2ConfirmWindowSec":   30,
      "gateReopenCooldownMin":  5
    },
    {
      "name":                  "Slot 2 (Right gate)",
      "lidarSensor":           "lidarSlot2",
      "gateTriggerRelay":      ["module1", "gateMotor2"],
      "gateReedSensor":        ["module2", "carGateRight"],
      "co2ConfirmWindowSec":   30,
      "gateReopenCooldownMin":  5
    }
  ],

  // ── Telegram bot integration ───────────────────────────────────────
  //
  // Sends gate open / close events with live sensor snapshot to t34_1_bot.
  // Leave botToken / chatId empty to disable notifications silently.
  //
  // scriptPath – absolute path to send_tg.sh on the WB device.
  //   Deploy telegram/send_tg.sh from the repo to this location:
  //   scp telegram/send_tg.sh root@wb-device:/usr/local/bin/t34_send_tg.sh
  //   chmod +x /usr/local/bin/t34_send_tg.sh
  "telegram": {
    "botToken":   "7042371125:AAGoHru0YWW9l4vihJPYP72DIAtq6PkzcqE",
    "chatId":     "2006469967",
    "scriptPath": "/usr/local/bin/t34_send_tg.sh"
  }
}
